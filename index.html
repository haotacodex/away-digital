<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Away Digital — Email Signature Generator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: #f0f0f0; padding: 32px 16px; }
  .app { max-width: 760px; margin: 0 auto; }

  h1 { font-size: 18px; font-weight: 700; color: #000; margin-bottom: 4px; }
  .subtitle { font-size: 13px; color: #555; margin-bottom: 24px; }

  .form-card { background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 24px; margin-bottom: 28px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.05em; }
  .field input { width: 100%; padding: 8px 11px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; color: #000000; font-family: Arial, sans-serif; }
  .field input:focus { outline: none; border-color: #000; }

  .mobile-toggle { display: flex; align-items: center; gap: 8px; }
  .mobile-toggle input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #000; }
  .mobile-toggle label { font-size: 11px; font-weight: 700; color: #555; text-transform: uppercase; letter-spacing: 0.05em; cursor: pointer; }

  .preview-label { font-size: 11px; font-weight: 700; color: #999; text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 10px; }
  .sig-wrapper { background: #fff; border: 1px solid #ccc; border-radius: 6px; padding: 28px; display: inline-block; margin-bottom: 20px; }

  .btn-row { display: flex; gap: 12px; }
  .btn-copy {
    padding: 11px 28px; background: #000; color: #fff; border: none;
    border-radius: 4px; font-size: 13px; font-weight: 700; cursor: pointer;
    font-family: Arial, sans-serif; transition: background 0.15s;
  }
  .btn-copy:hover { background: #333; }
  .btn-copy.copied { background: #2e7d32; }

  @media (max-width: 580px) { .form-grid { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="app">
  <h1>Away Digital — Email Signature Generator</h1>
  <p class="subtitle">Fill in the fields below. The signature updates live.</p>

  <!-- FORM -->
  <div class="form-card">
    <div class="form-grid">
      <div class="field">
        <label for="inp-name">Full Name</label>
        <input id="inp-name" type="text" placeholder="e.g. Paul Fellows" value="Paul Fellows" oninput="updateSig()">
      </div>
      <div class="field">
        <label for="inp-title">Job Title</label>
        <input id="inp-title" type="text" placeholder="e.g. Operations Manager" value="Operations Manager" oninput="updateSig()">
      </div>
      <div class="field">
        <label for="inp-email">Email</label>
        <input id="inp-email" type="text" placeholder="e.g. f@awaydigital.com" value="paulf@awaydigital.com" oninput="updateSig()">
      </div>
      <div class="field">
        <label for="inp-phone">Phone</label>
        <input id="inp-phone" type="text" placeholder="e.g. +613 9534 5025" value="+613 9534 5025" oninput="updateSig()">
      </div>
      <div class="field">
        <div class="mobile-toggle" style="margin-bottom:6px;">
          <input type="checkbox" id="chk-mobile" checked onchange="updateSig()">
          <label for="chk-mobile">Show Mobile</label>
        </div>
        <input id="inp-mobile" type="text" placeholder="e.g. +61 498 653 772" value="+61 498 653 772" oninput="updateSig()">
      </div>
    </div>
  </div>

  <!-- LIVE PREVIEW -->
  <div class="preview-label">Live Preview</div>
  <div class="sig-wrapper">
    <div id="sig-output"></div>
  </div>
  <br>
  <div class="btn-row">
    <button class="btn-copy" onclick="copySig()">Copy Signature HTML</button>
  </div>
</div>

<script>
function getSigHTML() {
  const name    = document.getElementById('inp-name').value   || 'Paul Fellows';
  const title   = document.getElementById('inp-title').value  || 'Operations Manager';
  const email   = document.getElementById('inp-email').value  || 'f@awaydigital.com';
  const phone   = document.getElementById('inp-phone').value  || '+613 9534 5025';
  const mobile  = document.getElementById('inp-mobile').value || '+61 498 653 772';
  const showMob = document.getElementById('chk-mobile').checked;


  return `<table cellpadding="0" cellspacing="0" border="0" style="font-family:Arial,sans-serif;">

  <!-- NAME | TITLE -->
  <tr>
    <td style="font-family:Arial,sans-serif;font-size:13px;line-height:1.4;padding-bottom:20px;">
      <span style="font-weight:700;color:#000;">${name}</span>
      <span style="color:#cccccc;padding:0 5px;font-weight:500;">|</span>
      <span style="color:#000000;font-weight:500;">${title}</span>
    </td>
  </tr>

  <!-- GIF BANNER -->
  <tr>
    <td style="padding-bottom:20px;">
      <a href="https://www.awaydigital.com/" target="_blank" style="display:inline-block;text-decoration:none;">
        <img src="https://github.com/haotacodex/away-digital/blob/main/email-signature/Away%20Digital.gif?raw=true"
             width="360" height="143" alt="Away Digital" style="display:block;border:0;">
      </a>
    </td>
  </tr>

  <!-- CONTACT: 2 COLUMNS (Website+Email | Phone+Mobile) -->
  <tr>
    <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;padding-bottom:0;line-height:1.1;">
      <table cellpadding="0" cellspacing="0" border="0" style="height:100%;">
        <tr style="vertical-align:top;">
          <!-- LEFT COLUMN: Website & Email -->
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;padding-right:10px;vertical-align:top;font-weight:500;width:auto;">
            <div style="margin-bottom:5px;">
              <a href="https://awaydigital.com" target="_blank"
                 style="font-family:Arial,sans-serif;font-size:13px;color:#000;text-decoration:none;font-weight:500;">awaydigital.com</a>
            </div>
            <div>
              <a href="mailto:${email}" style="font-family:Arial,sans-serif;font-size:13px;color:#000;text-decoration:none;font-weight:500;">${email}</a>
            </div>
          </td>
          <!-- DIVIDER -->
          <td style="width:1px;background-color:#cccccc;margin:0 10px;vertical-align:stretch;"></td>
          <!-- RIGHT COLUMN: Phone & Mobile -->
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;padding-left:10px;vertical-align:top;font-weight:500;width:auto;">
            <div style="margin-bottom:5px;">
              <span style="color:#000;font-weight:500;">Phone</span>&nbsp;&nbsp;${phone}
            </div>
            ${showMob ? `<div>
              <span style="color:#000;font-weight:500;">Mobile</span>&nbsp;&nbsp;${mobile}
            </div>` : ''}
          </td>
        </tr>
      </table>
    </td>
  </tr>

  <!-- SPACER -->
  <tr><td height="20" style="font-size:0;line-height:0;padding:0;">&nbsp;</td></tr>

  <!-- OFFICES -->
  <tr>
    <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;line-height:1.4;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr valign="top">
          <td style="font-family:Arial,sans-serif;font-size:13px;font-weight:500;color:#000;padding-right:10px;white-space:nowrap;">Australia</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#cccccc;padding-right:10px;font-weight:500;">|</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;font-weight:500;">Suite 4 &amp; 5, 15 Inkerman St, St Kilda VIC 3182</td>
        </tr>
        <tr valign="top">
          <td style="font-family:Arial,sans-serif;font-size:13px;font-weight:500;color:#000;padding-right:10px;white-space:nowrap;">USA</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#cccccc;padding-right:10px;font-weight:500;">|</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;font-weight:500;">7055 Old Katy Rd, Suite #541, Houston, TX 77024</td>
        </tr>
        <tr valign="top">
          <td style="font-family:Arial,sans-serif;font-size:13px;font-weight:500;color:#000;padding-right:10px;white-space:nowrap;">Vietnam</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#cccccc;padding-right:10px;font-weight:500;">|</td>
          <td style="font-family:Arial,sans-serif;font-size:13px;color:#000;font-weight:500;">IPC Tower, Level 12, 1489 Nguyen Van Linh, District 7 HCMC</td>
        </tr>
      </table>
    </td>
  </tr>

</table>`;
}

function updateSig() {
  document.getElementById('sig-output').innerHTML = getSigHTML();
}

function copySig() {
  const html = getSigHTML();
  if (navigator.clipboard) {
    const blob = new Blob([html], { type: 'text/html' });
    const data = [new ClipboardItem({ 'text/html': blob, 'text/plain': new Blob([html], { type: 'text/plain' }) })];
    navigator.clipboard.write(data).then(() => flashCopied()).catch(() => fallbackCopy(html));
  } else {
    fallbackCopy(html);
  }
}

function fallbackCopy(html) {
  const ta = document.createElement('textarea');
  ta.value = html;
  document.body.appendChild(ta);
  ta.select();
  document.execCommand('copy');
  document.body.removeChild(ta);
  flashCopied();
}

function flashCopied() {
  const btn = document.querySelector('.btn-copy');
  btn.textContent = '✓ Copied!';
  btn.classList.add('copied');
  setTimeout(() => { btn.textContent = 'Copy Signature HTML'; btn.classList.remove('copied'); }, 2000);
}

// Init
updateSig();
</script>
</body>
</html>
